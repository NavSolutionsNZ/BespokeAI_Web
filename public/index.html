<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>BespoxAI — Coming Soon</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:      #040E09;
      --forest:   #0A5C46;
      --jade:     #1A9272;
      --cream:    #F4EFE4;
      --parchment:#EDE8DC;
      --slate:    #3B5249;
      --fog:      #D6D9D4;
      --white:    #FAFAF8;
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body:    'DM Sans', system-ui, sans-serif;
      --font-mono:    'DM Mono', monospace;
    }

    html, body {
      height: 100%;
      background: var(--ink);
      color: var(--cream);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    /* Forest green radial glow */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 90% 70% at 50% 35%, rgba(10,92,70,0.45) 0%, rgba(10,92,70,0.08) 55%, transparent 75%);
      pointer-events: none;
    }

    .wordmark {
      font-family: var(--font-display);
      font-size: clamp(28px, 5vw, 42px);
      font-weight: 600;
      letter-spacing: -0.01em;
      margin-bottom: 3rem;
    }

    .wordmark span { color: var(--cream); }

    .wordmark em {
      font-style: italic;
      font-weight: 400;
      color: var(--jade);
    }

    .divider {
      width: 40px;
      height: 2px;
      background: var(--forest);
      margin: 0 auto 3rem;
      border-radius: 2px;
    }

    h1 {
      font-family: var(--font-display);
      font-size: clamp(38px, 7vw, 72px);
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: 1.5rem;
      max-width: 680px;
      color: var(--white);
    }

    h1 em {
      font-style: italic;
      color: var(--jade);
    }

    p.sub {
      font-size: clamp(14px, 2vw, 16px);
      color: rgba(244,239,228,0.6);
      line-height: 1.75;
      max-width: 480px;
      margin: 0 auto 3rem;
    }

    .login-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--cream);
      text-decoration: none;
      background: var(--forest);
      border: 1px solid var(--forest);
      border-radius: 6px;
      padding: 12px 22px;
      transition: background 0.2s, border-color 0.2s;
    }

    .login-link:hover {
      background: var(--jade);
      border-color: var(--jade);
    }

    .footer {
      position: absolute;
      bottom: 2rem;
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      color: rgba(244,239,228,0.2);
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="wordmark"><span>Bespox</span><em>AI</em></div>
  <div class="divider"></div>
  <h1>Something<br><em>significant</em><br>is coming.</h1>
  <p class="sub">BespoxAI is a portal for Business Central and NAV — feasibility, scoping, development, and live data queries, all in one place. We&rsquo;re putting the finishing touches on it now.</p>
  <a class="login-link" href="/login">Existing users — sign in →</a>
  <div class="footer">BespoxAI &mdash; NavSolutions NZ</div>
</body>
</html>
